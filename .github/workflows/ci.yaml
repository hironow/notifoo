name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Rust rewrite is distributed via the canary channel only; canary is a
          # moving tag, so never reuse a cached executable.
          bun-version: canary
          no-cache: true
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: lts
          cache: true
      # Format check is enforced locally via pre-commit hook (vp check --fix).
      # CI skips format because setup-vp installs latest global vp which may
      # bundle a different oxfmt version than the pinned local vite-plus.
      - run: vp lint
      - run: tsc --noEmit
      - name: Typecheck server
        run: cd server && bun install && bun run build

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Rust rewrite is distributed via the canary channel only; canary is a
          # moving tag, so never reuse a cached executable.
          bun-version: canary
          no-cache: true
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: lts
          cache: true
      - run: tsc && vp build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Rust rewrite is distributed via the canary channel only; canary is a
          # moving tag, so never reuse a cached executable.
          bun-version: canary
          no-cache: true
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: lts
          cache: true
      - name: Install server dependencies
        run: cd server && bun install && bun run build
      - name: Run E2E tests
        run: bunx playwright test
      - name: Upload test report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
