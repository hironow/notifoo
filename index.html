<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>notifoo</title>

    <base href="/" />

    <!-- This meta viewport ensures the webpage's dimensions change according to the device it's on. This is called Responsive Web Design.-->
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <meta name="description" content="This is a notifoo app" />

    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#181818" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f3f3" />

    <!-- Apple PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="notifoo" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Icons: favicon + Apple touch icon (iOS ignores manifest icons) -->
    <link rel="icon" href="/assets/icons/icon_48.png" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/icons/192x192.png" />

    <!-- Imports the manifest to represent the web application. A web app must have a manifest to be a PWA. -->
    <link rel="manifest" href="manifest.json" />

    <!-- Web Awesome styles -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.5.0/dist/styles/webawesome.css"
      integrity="sha384-EcX+ovNyMol+lJfWp9QOYohWQoxo3XNk8eYPv4NLKejxtQ3Ret8v1LPzsGbwYzwY"
      crossorigin="anonymous"
    />

    <!-- Web Awesome components (external URL: Vite will not process this) -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.5.0/dist-cdn/webawesome.js"
      integrity="sha384-Gt6W71P8tMHtPJtpLjo+JVqQ4+3mYPoHNnBgoY5gUl0hf7G0FwxphgwwkD6rYNlS"
      crossorigin="anonymous"
    ></script>

    <script type="module" src="/src/main.tsx"></script>
  </head>

  <body>
    <div id="root"></div>

    <script>
      if ("serviceWorker" in navigator) {
        window.onload = () => {
          navigator.serviceWorker.register("/sw.js");
        };
      }
    </script>
  </body>
</html>
